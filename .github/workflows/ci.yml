name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  ci:
    name: lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Check lockfile is up to date
        run: uv lock --check

      - name: Check a2a-sdk pin vs PyPI
        run: scripts/check-a2a-sdk-version.sh

      - name: Lint and format check
        run: scripts/lint-check.sh

      - name: Type check
        run: scripts/type-check.sh

      - name: Test
        run: scripts/test.sh
