name: Release

# Bumps version, updates CHANGELOG.md, tags v*, creates GitHub Release, and uploads wheels.
# Release commits include [skip ci] so this workflow does not loop.
#
# Concurrency: only one Release run per branch at a time. With cancel-in-progress: false, a new
# push to main while a release is still running is queued (Actions UI shows "Pending") until the
# previous run finishes — that can look like a slow trigger. Merge to main again after the prior
# Release completes, or run workflow_dispatch below once the queue is clear.
#
# GitHub can also take a short time to assign a runner; that is outside this workflow.
#
# Manual "Run workflow": GitHub only shows it when THIS FILE (including workflow_dispatch) is on
# the default branch — merge dev → main (or cherry-pick this file) before expecting the button.

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Configure git for release commits
        run: |
          git config user.name "agsuy"
          git config user.email "37564412+agsuy@users.noreply.github.com"

      - name: Version, tag, and GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release version

      - name: Upload distributions to GitHub Release
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release publish --tag "${{ steps.release.outputs.tag }}"
