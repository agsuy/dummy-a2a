name: Sync dev after release

# After a successful Release on main, move dev forward to match main — but ONLY when dev is
# behind main (fast-forward). If dev has commits not on main, we fail the job instead of
# `reset --hard`, which would silently drop integration work (e.g. an open dev → main PR).

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  sync-dev:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: dev

      - name: Configure git
        run: |
          git config user.name "agsuy"
          git config user.email "37564412+agsuy@users.noreply.github.com"

      - name: Fetch main and sync only when dev is not ahead
        run: |
          set -euo pipefail
          git fetch origin main
          main_sha="$(git rev-parse origin/main)"
          dev_sha="$(git rev-parse HEAD)"
          if [ "$dev_sha" = "$main_sha" ]; then
            echo "dev already matches main; nothing to do."
            exit 0
          fi
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "dev is behind main; resetting dev to main."
            git reset --hard origin/main
            git push --force-with-lease origin HEAD:dev
            exit 0
          fi
          echo "::error::dev is ahead of or diverged from main — refusing reset (would drop unmerged work). Merge dev into main, then re-run Release or sync dev manually."
          exit 1
