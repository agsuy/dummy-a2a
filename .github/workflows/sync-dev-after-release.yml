name: Sync dev after release

# After a successful Release on main, reset dev to match origin/main and force-push (with lease).
# This works with squash merges to main (dev is not a history ancestor of main after squash).
# Tradeoff: any commits that exist only on dev and were never merged to main are dropped from dev.
# If an open PR targets main from dev, we skip the reset so the PR stays valid until it merges or closes.
# workflow_dispatch: run manually from the Actions tab (same steps and PR guard as after Release).

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sync-dev:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: dev

      - name: Configure git
        run: |
          git config user.name "agsuy"
          git config user.email "37564412+agsuy@users.noreply.github.com"

      - name: Open PRs from dev to main
        id: pr_check
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { data } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              base: "main",
              head: `${context.repo.owner}:dev`,
              per_page: 100,
            });
            const count = data.length;
            core.info(`open_dev_to_main_prs=${count}`);
            if (count > 0) {
              core.notice(
                `Skipping dev reset: ${count} open PR(s) from dev to main.`,
              );
            }
            core.setOutput("skip_reset", count > 0 ? "true" : "false");

      - name: Reset dev to origin/main
        if: steps.pr_check.outputs.skip_reset != 'true'
        run: |
          set -euo pipefail
          git fetch origin main
          main_sha="$(git rev-parse origin/main)"
          dev_sha="$(git rev-parse HEAD)"
          if [ "$dev_sha" = "$main_sha" ]; then
            echo "dev already matches main; nothing to do."
            exit 0
          fi
          echo "Resetting dev to origin/main (post-release alignment; squash-safe)."
          git reset --hard origin/main
          git push --force-with-lease origin HEAD:dev
