name: Publish

# Publishes to PyPI when a release tag (v*) is pushed.
# Requires PyPI Trusted Publishing: repo environment "pypi", workflow publish.yml.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.12

      - name: Build
        run: uv build

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl python -c "import dummy_a2a"

      - name: Publish
        run: uv publish
